<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<div id="admission-form">
    <h1>College Admission Form</h1>

    <form>

        <label>Full Name</label><br>
        <input type="text" placeholder="Full Name" required><br><br>

        <label>Age</label><br>
        <input type="number" placeholder="Age" required><br><br>

        <label>Gender</label><br>
        <input type="text" placeholder="Gender" required><br><br>

        <label>Date of Birth</label><br>
        <input type="date" required><br><br>

        <label>10+2 Year of Passing</label><br>
        <input type="number" placeholder="Year" required><br><br>

        <label>10th Percentage</label><br>
        <input type="number" placeholder="10th Percentage" required><br><br>

        <label>12th Percentage</label><br>
        <input type="number" placeholder="12th Percentage" required><br><br>

        <label>Upload Marksheet</label><br>
        <input type="file" required><br><br>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
