<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos API</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
            color: #0d6efd;
        }

        .card {
            margin-bottom: 20px;
            transition: 0.3s;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        #loading {
            text-align: center;
            font-size: 22px;
            color: green;
        }

        #error {
            color: red;
            text-align: center;
            font-size: 20px;
            display: none;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Photos API</h1>

        <div id="loading">Loading...</div>

        <div id="error">Failed to load data.</div>

        <div class="row" id="cards"></div>

    </div>

    <script>

        const cards = document.getElementById("cards");
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");

        async function getPhotos() {

            try {

                const response = await fetch("https://jsonplaceholder.typicode.com/photos");

                if (!response.ok) {
                    throw new Error("Error");
                }

                const data = await response.json();

                loading.style.display = "none";

                if (data.length === 0) {
                    cards.innerHTML = "<h3 class='text-center'>No Data Found</h3>";
                    return;
                }

                data.slice(0, 20).forEach(photo => {

                    cards.innerHTML += `
<div class="col-md-4 mb-4">
    <div class="card h-100">
        <img src="https://picsum.photos/seed/${photo.id}/150" class="card-img-top" alt="Photo">
        <div class="card-body">
            <h5 class="card-title">${photo.title}</h5>
        </div>
    </div>
</div>
`;

                });

            }

            catch (err) {

                loading.style.display = "none";
                error.style.display = "block";

            }

        }

        getPhotos();

    </script>

</body>

</html>
