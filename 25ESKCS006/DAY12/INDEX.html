<body>
<!--
  FIXED: this used to have
    <img src="uploads/<?php echo $row['photo']; ?>" width="70">
  right here. Two problems: this is a .html file, so the browser never
  executes PHP in it — it would've just printed the literal text
  "<?php echo $row['photo']; ?>" on the page. And $row isn't defined
  anywhere on a registration form anyway (no logged-in user, no query).
  Removed it. If you want to show a logged-in user's avatar later, that
  belongs on a page rendered with a .php extension after a login check.
-->
<div class="container mt-5">

<div class="text-end mb-2">
<a href="auth/login.php" class="text-decoration-none">Admin Login</a>
</div>

<div class="card shadow p-4">

<h2 class="text-center text-primary mb-4">
Student Registration Form
</h2>

<form action="submit.php" method="POST" enctype="multipart/form-data">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control">
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control">
</div>

</div>

<div class="mb-3">

<label>Gender</label>

<div class="form-check">
<input type="radio" class="form-check-input" name="gender" value="Male">
<label class="form-check-label">Male</label>
</div>

<div class="form-check">
<input type="radio" class="form-check-input" name="gender" value="Female">
<label class="form-check-label">Female</label>
</div>

<div class="form-check">
<input type="radio" class="form-check-input" name="gender" value="Other">
<label class="form-check-label">Other</label>
</div>

</div>
<div class="mb-3">
<label>Status</label>

<select name="status" class="form-select">
    <option value="Active">Active</option>
    <option value="Inactive">Inactive</option>
</select>
</div>

<div class="mb-3">

<label>Course</label>

<select name="course" class="form-select">

<option value="">Select Course</option>

<option>BCA</option>
<option>B.Tech</option>
<option>BBA</option>
<option>MCA</option>
<option>MBA</option>

</select>

</div>

<div class="mb-3">

<label>Address</label>

<textarea
name="address"
rows="4"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Profile Photo</label>

<input
type="file"
name="photo"
class="form-control">

</div>

<div class="text-center">

<button class="btn btn-primary px-5">
SUBMIT
</button>

</div>

</form>

</div>

</div>

</body>
</html>
